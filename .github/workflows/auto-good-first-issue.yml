name: Auto-add good first issue label

on:
  issues:
    types: [opened, labeled, edited]

permissions:
  issues: write

jobs:
  add-label:
    runs-on: ubuntu-latest
    steps:
      - name: Add good first issue when beginner label is present
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            if (!issue) return;

            const labels = issue.labels.map((label) => label.name);
            const hasBeginner = labels.includes('beginner');
            const hasGoodFirst = labels.includes('good first issue');

            if (hasBeginner && !hasGoodFirst) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                labels: ['good first issue'],
              });
            }
